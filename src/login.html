<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - StudyShield</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-body { display: flex; align-items: center; justify-content: center; height: 100vh; }
    .auth-card { width: 100%; max-width: 400px; text-align: center; }
    .auth-card h2 { margin-bottom: 2rem; color: var(--accent); }
    .auth-links { margin-top: 1rem; font-size: 0.9rem; }
    .auth-links a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body class="auth-body">
  <div class="card auth-card">
    <h2>Welcome Back</h2>
    <form id="login-form">
      <input type="email" id="email" class="input" placeholder="Email Address" required>
      <input type="password" id="password" class="input" placeholder="Password" required>
      <button type="submit" class="btn btn-primary" style="width: 100%">Log In</button>
    </form>
    <div class="auth-links">
      Don't have an account? <a href="signup.html">Sign Up</a>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
