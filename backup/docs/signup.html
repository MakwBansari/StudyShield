<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - StudyShield</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-body">
  <div class="card auth-card">
    <h2>Create Account</h2>
    <form id="signup-form">
      <!-- STEP 1: ACCOUNT -->
      <div id="signup-step-1">
        <input type="text" id="name" class="input" placeholder="Full Name" required>
        <input type="email" id="email" class="input" placeholder="Email Address" required>
        <input type="password" id="password" class="input" placeholder="Password" required>
        <button type="button" id="btn-to-step-2" class="btn btn-primary" style="width: 100%">Next: Focus Preferences</button>
      </div>

      <!-- STEP 2: PREFERENCES -->
      <div id="signup-step-2" class="hidden">
        <h3 style="font-size: 1rem; margin-bottom: 0.5rem; color: var(--text-muted);">Whitelist (Max 10)</h3>
        <textarea id="whitelist-input" class="input" placeholder="e.g. google.com, stackoverflow.com (one per line)" style="height: 100px; resize: none;"></textarea>
        
        <h3 style="font-size: 1rem; margin-top: 1rem; margin-bottom: 0.5rem; color: var(--text-muted);">Blacklist (Max 10)</h3>
        <textarea id="blacklist-input" class="input" placeholder="e.g. facebook.com, instagram.com (one per line)" style="height: 100px; resize: none;"></textarea>
        
        <div style="display: flex; gap: 1rem; margin-top: 1.5rem;">
          <button type="button" id="btn-back-to-step-1" class="btn btn-secondary" style="flex: 1">Back</button>
          <button type="submit" class="btn btn-primary" style="flex: 2">Create Account</button>
        </div>
      </div>
    </form>
    <div class="auth-links">
      Already have an account? <a href="login.html">Log In</a>
    </div>
  </div>
  <script src="auth.js"></script>
</body>
</html>
